<div class="login-container">
  <div class="login-box">
    <h1>🔐 Inventario</h1>
    <h2>Iniciar Sesión</h2>

    <div *ngIf="error" class="error">
      {{ error }}
    </div>

    <input
      [(ngModel)]="username"
      placeholder="Usuario"
      type="text"
    />

    <input
      [(ngModel)]="password"
      placeholder="Contraseña"
      type="password"
    />

    <button (click)="login()">Entrar</button>
  </div>
</div>
